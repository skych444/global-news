<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global News</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GlobalNews">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">

    <!-- Fonts and Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css?v=15">
</head>

<body>
    <div class="app-container">

        <!-- Header -->
        <header class="glass-header">
            <div class="header-left">
                <h1 class="brand-title">GLOBAL<span>NEWS</span></h1>
            </div>

            <nav class="main-nav">
                <div class="nav-inner">
                    <button class="nav-item active" data-category="world">Monde</button>
                    <button class="nav-item" data-category="france">France</button>
                    <button class="nav-item" data-category="business">Éco</button>
                    <button class="nav-item" data-category="bourse">Bourse</button>
                    <button class="nav-item" data-category="people">People</button>
                    <button class="nav-item" data-category="media">Médias</button>
                </div>
            </nav>

            <div class="header-right">
                <button id="theme-btn" class="icon-btn" aria-label="Changer le thème">
                    <i class="ri-sun-line"></i>
                </button>
                <button id="install-btn" class="icon-btn hidden" aria-label="Installer l'app">
                    <i class="ri-install-line"></i>
                </button>
                <button id="push-btn" class="icon-btn" aria-label="Notifications">
                    <i class="ri-notification-3-line"></i>
                </button>
                <button id="refresh-btn" class="icon-btn" aria-label="Rafraîchir">
                    <i class="ri-refresh-line"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main id="news-feed" class="news-feed">
            <!-- Pull to refresh indicator -->
            <div id="ptr-indicator" class="ptr-indicator">
                <div class="ptr-spinner"></div>
            </div>

            <!-- Loader -->
            <div id="loader" class="loader-container">
                <div class="spinner"></div>
                <p>Récupération des informations...</p>
            </div>

            <div id="articles-container" class="articles-grid">
                <!-- Articles will be injected here via JS -->
            </div>
        </main>




    </div>

    <script src="app.js?v=15"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.error('Service Worker registration failed', err));
            });
        }
    </script>
</body>

</html>
